<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ heading }}</title>
</head>
<!--
  OrbiSave verification email.
  Design rules (match the app): brand green #00ab00, navy #0a2540, flat:
  radius never above 4px, NO box-shadows anywhere. The logo is rebuilt in
  HTML/CSS (green square mark + wordmark) rather than an <img>, so it renders
  identically in every client with no asset hosting and no blocked images.
  Table-based + inline styles for email-client compatibility.
-->
<body style="margin:0; padding:0; background-color:#f8fafc; -webkit-font-smoothing:antialiased;">

  <!-- Preheader: shown in inbox preview, hidden in the body -->
  <div style="display:none; max-height:0; overflow:hidden; opacity:0;">
    {{ code }} is your OrbiSave verification code.
  </div>

  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="background-color:#f8fafc;">
    <tr>
      <td align="center" style="padding:40px 16px;">

        <table role="presentation" width="600" cellpadding="0" cellspacing="0" border="0" style="width:100%; max-width:600px; background-color:#ffffff; border:1px solid #e4e7ec; border-radius:4px;">

          <!-- Logo -->
          <tr>
            <td style="padding:28px 32px; border-bottom:1px solid #f2f4f7;">
              <table role="presentation" cellpadding="0" cellspacing="0" border="0">
                <tr>
                  <td style="width:34px; height:34px; background-color:#00ab00; border-radius:4px; text-align:center; vertical-align:middle; font-family:'Montserrat','Segoe UI',Roboto,Helvetica,Arial,sans-serif; font-size:16px; font-weight:700; color:#ffffff; line-height:34px;">
                    O
                  </td>
                  <td style="padding-left:10px; font-family:'Montserrat','Segoe UI',Roboto,Helvetica,Arial,sans-serif; font-size:18px; font-weight:700; color:#0a2540; letter-spacing:-0.2px;">
                    OrbiSave
                  </td>
                </tr>
              </table>
            </td>
          </tr>

          <!-- Body -->
          <tr>
            <td style="padding:36px 32px 8px 32px; font-family:'Montserrat','Segoe UI',Roboto,Helvetica,Arial,sans-serif;">
              <h1 style="margin:0 0 12px 0; font-size:22px; line-height:1.3; font-weight:600; color:#0a2540;">
                {{ heading }}
              </h1>
              <p style="margin:0; font-size:15px; line-height:1.65; color:#667085;">
                {{ intro }}
              </p>
            </td>
          </tr>

          <!-- Code -->
          <tr>
            <td style="padding:24px 32px;">
              <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="background-color:#f9fafb; border:1px solid #e4e7ec; border-radius:4px;">
                <tr>
                  <td align="center" style="padding:24px 16px; font-family:'Montserrat','Segoe UI',Roboto,Helvetica,Arial,sans-serif; font-size:32px; font-weight:700; letter-spacing:10px; color:#0a2540;">
                    {{ code }}
                  </td>
                </tr>
              </table>
            </td>
          </tr>

          <!-- Expiry + disclaimer -->
          <tr>
            <td style="padding:0 32px 36px 32px; font-family:'Montserrat','Segoe UI',Roboto,Helvetica,Arial,sans-serif;">
              <p style="margin:0 0 20px 0; font-size:14px; line-height:1.6; color:#98a2b3;">
                {{ expiry }}
              </p>
              <p style="margin:0; padding-top:20px; border-top:1px solid #f2f4f7; font-size:13px; line-height:1.6; color:#98a2b3;">
                {{ disclaimer }}
              </p>
            </td>
          </tr>

        </table>

        <!-- Footer -->
        <table role="presentation" width="600" cellpadding="0" cellspacing="0" border="0" style="width:100%; max-width:600px;">
          <tr>
            <td align="center" style="padding:24px 16px 0 16px; font-family:'Montserrat','Segoe UI',Roboto,Helvetica,Arial,sans-serif; font-size:12px; line-height:1.6; color:#98a2b3;">
              Digitizing Africa&rsquo;s oldest savings tradition.<br>
              &copy; {{ year }} OrbiSave. This is an automated message. Please do not reply.
            </td>
          </tr>
        </table>

      </td>
    </tr>
  </table>

</body>
</html>
