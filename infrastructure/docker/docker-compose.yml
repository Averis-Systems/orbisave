name: orbisave
version: '3.9'

services:
  # ──────────────────────────────────────────────────────────────────
  # PostgreSQL 16
  # ──────────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: orbisave_db
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-multi-db.sh:/docker-entrypoint-initdb.d/init-multi-db.sh
    environment:
      POSTGRES_DB: orbisave
      POSTGRES_USER: orbisave
      POSTGRES_PASSWORD: dev_password
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U orbisave']
      interval: 5s
      timeout: 5s
      retries: 10

  # ──────────────────────────────────────────────────────────────────
  # Redis 7
  # ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: orbisave_redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 10

  # ──────────────────────────────────────────────────────────────────
  # Django / Daphne Backend
  # ──────────────────────────────────────────────────────────────────
  backend:
    build:
      context: ../../backend
      dockerfile: ../infrastructure/docker/Dockerfiles/backend.Dockerfile
    container_name: orbisave_backend
    restart: unless-stopped
    volumes:
      - ../../backend:/app
    ports:
      - '8000:8000'
    env_file:
      - ../../backend/.env
    environment:
      DATABASE_URL: postgresql://orbisave:dev_password@db:5432/orbisave
      DATABASE_URL_KENYA: postgresql://orbisave:dev_password@db:5432/orbisave_ke
      DATABASE_URL_RWANDA: postgresql://orbisave:dev_password@db:5432/orbisave_rw
      DATABASE_URL_GHANA: postgresql://orbisave:dev_password@db:5432/orbisave_gh
      REDIS_URL: redis://redis:6379/0
      DJANGO_SETTINGS_MODULE: config.settings.development
      DEBUG: 'True'
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py collectstatic --noinput &&
             daphne -b 0.0.0.0 -p 8000 config.asgi:application"

  # ──────────────────────────────────────────────────────────────────
  # Celery Worker
  # ──────────────────────────────────────────────────────────────────
  celery:
    build:
      context: ../../backend
      dockerfile: ../infrastructure/docker/Dockerfiles/backend.Dockerfile
    container_name: orbisave_celery
    restart: unless-stopped
    volumes:
      - ../../backend:/app
    env_file:
      - ../../backend/.env
    environment:
      DATABASE_URL: postgresql://orbisave:dev_password@db:5432/orbisave
      DATABASE_URL_KENYA: postgresql://orbisave:dev_password@db:5432/orbisave_ke
      DATABASE_URL_RWANDA: postgresql://orbisave:dev_password@db:5432/orbisave_rw
      DATABASE_URL_GHANA: postgresql://orbisave:dev_password@db:5432/orbisave_gh
      REDIS_URL: redis://redis:6379/0
      DJANGO_SETTINGS_MODULE: config.settings.development
    depends_on:
      - db
      - redis
    command: celery -A celery_app worker -l info --concurrency=4

  # ──────────────────────────────────────────────────────────────────
  # Celery Beat Scheduler
  # ──────────────────────────────────────────────────────────────────
  celery-beat:
    build:
      context: ../../backend
      dockerfile: ../infrastructure/docker/Dockerfiles/backend.Dockerfile
    container_name: orbisave_celery_beat
    restart: unless-stopped
    volumes:
      - ../../backend:/app
    env_file:
      - ../../backend/.env
    environment:
      DATABASE_URL: postgresql://orbisave:dev_password@db:5432/orbisave
      DATABASE_URL_KENYA: postgresql://orbisave:dev_password@db:5432/orbisave_ke
      DATABASE_URL_RWANDA: postgresql://orbisave:dev_password@db:5432/orbisave_rw
      DATABASE_URL_GHANA: postgresql://orbisave:dev_password@db:5432/orbisave_gh
      REDIS_URL: redis://redis:6379/0
      DJANGO_SETTINGS_MODULE: config.settings.development
    depends_on:
      - db
      - redis
    command: celery -A celery_app beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler

  # ──────────────────────────────────────────────────────────────────
  # Flower — Celery task monitor
  # ──────────────────────────────────────────────────────────────────
  flower:
    image: mher/flower:2.0
    container_name: orbisave_flower
    restart: unless-stopped
    ports:
      - '5555:5555'
    environment:
      CELERY_BROKER_URL: redis://redis:6379/0
      FLOWER_BASIC_AUTH: admin:dev_flower_password
    depends_on:
      - redis

  # ──────────────────────────────────────────────────────────────────
  # Next.js Frontend
  # ──────────────────────────────────────────────────────────────────
  web:
    build:
      context: ../../frontend
      dockerfile: ../infrastructure/docker/Dockerfiles/web.Dockerfile
    container_name: orbisave_web
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ../../frontend:/app
      - /app/node_modules
      - /app/.next
    ports:
      - '3001:3000'
    environment:
      NEXTAUTH_URL: http://localhost:3001
      NEXTAUTH_SECRET: dev_secret_change_in_production_min32chars
      NEXT_PUBLIC_API_URL: http://backend:8000/api/v1
      NEXT_PUBLIC_WS_URL: ws://backend:8000/ws
      NEXT_PUBLIC_LIVEKIT_URL: ws://localhost:7880
    depends_on:
      backend:
        condition: service_started
    command: npm run dev

volumes:
  postgres_data:
  redis_data:
