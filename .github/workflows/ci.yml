name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ledger-write-guard:
    name: Ledger write guard (INV1)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: node scripts/check-ledger-writes.mjs

  backend:
    name: Backend (pytest + checks)
    runs-on: ubuntu-latest
    env:
      SECRET_KEY: ci-only-secret-key-not-production
      DJANGO_SETTINGS_MODULE: config.settings.test
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: backend/requirements/*.txt
      - run: pip install -r requirements/development.txt
      - name: Django system checks
        run: python manage.py check
      - name: Migration completeness
        run: python manage.py makemigrations --check --dry-run
      - name: Tests
        run: pytest -q
      - name: Bandit security scan (report-only)
        run: bandit -r apps common config -x apps/*/tests,apps/*/migrations || true

  web-apps:
    name: Build ${{ matrix.app.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app:
          - { name: frontend, dir: frontend }
          - { name: console, dir: apps/console }
          - { name: manager, dir: apps/manager }
    defaults:
      run:
        working-directory: ${{ matrix.app.dir }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ${{ matrix.app.dir }}/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build
      - name: Dependency audit (report-only)
        run: npm audit --audit-level=high || true
